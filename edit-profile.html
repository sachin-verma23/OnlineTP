<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; min-height: 100vh; }

        .header {
            background: white; padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 16px;
        }
        .back-btn {
            width: 40px; height: 40px; background: #f1f5f9; border: none;
            border-radius: 10px; font-size: 20px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .back-btn:hover { background: #e2e8f0; transform: translateX(-2px); }
        .header h1 { font-size: 22px; color: #1e3a5f; }

        .container { max-width: 480px; margin: 40px auto; padding: 0 20px; }

        .card {
            background: white; border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 36px;
        }

        /* Avatar */
        .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
        .avatar-wrap { position: relative; width: 110px; height: 110px; margin-bottom: 10px; }
        .avatar-circle {
            width: 110px; height: 110px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; font-weight: 700; color: white;
            border: 3px solid #e2e8f0;
            overflow: hidden;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-edit-btn {
            position: absolute; bottom: 4px; right: 4px;
            width: 32px; height: 32px; border-radius: 50%;
            background: #667eea; color: white; border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; transition: background 0.2s;
        }
        .avatar-edit-btn:hover { background: #5568d3; }
        #picInput { display: none; }
        .avatar-hint { font-size: 12px; color: #94a3b8; }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #1e3a5f; margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 13px 14px;
            border: 2px solid #e2e8f0; border-radius: 10px;
            font-size: 15px; color: #1e3a5f; transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-group input:disabled { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }

        .save-btn {
            width: 100%; padding: 14px; background: #667eea; color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s; margin-top: 6px;
        }
        .save-btn:hover { background: #5568d3; }
        .save-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

        .msg {
            text-align: center; font-size: 14px; font-weight: 600;
            margin-top: 14px; padding: 12px; border-radius: 8px; display: none;
        }
        .msg.success { display: block; background: #dcfce7; color: #166534; }
        .msg.error   { display: block; background: #fef2f2; color: #dc2626; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href='traildashboard.html'">←</button>
    <h1>👤 Edit Profile</h1>
</div>

<div class="container">
    <div class="card">

        <!-- Avatar -->
        <div class="avatar-section">
            <div class="avatar-wrap">
                <div class="avatar-circle" id="avatarCircle">
                    <span id="avatarInitial">?</span>
                    <img id="avatarImg" src="" alt="Profile Picture">
                </div>
                <div class="avatar-edit-btn" onclick="document.getElementById('picInput').click()">✏️</div>
            </div>
            <input type="file" id="picInput" accept="image/*" onchange="handlePicSelect(event)">
            <span class="avatar-hint">Click ✏️ to change photo</span>
        </div>

        <!-- Fields -->
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="inputName" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" id="inputRoll" placeholder="e.g. 21CS001">
        </div>

        <div class="form-group">
            <label>Email (cannot be changed)</label>
            <input type="text" id="inputEmail" disabled>
        </div>

        <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
        <div class="msg" id="msg"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCPD5wZ6J7AaRWCoLG095Iv8wD72R6dPP4",
        authDomain: "online-exam-platform-27e0f.firebaseapp.com",
        projectId: "online-exam-platform-27e0f",
        storageBucket: "online-exam-platform-27e0f.firebasestorage.app",
        messagingSenderId: "586357759308",
        appId: "1:586357759308:web:efabf47989f883b1c0c3e9"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;
    let newPicBase64 = null; // stores selected picture as base64

    // ── Load existing profile from Firestore ──────────────────
    async function loadProfile(user) {
        currentUser = user;
        document.getElementById('inputEmail').value = user.email;

        try {
            const doc = await db.collection('students').doc(user.uid).get();
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('inputName').value = d.name   || '';
                document.getElementById('inputRoll').value = d.rollNo || '';

                if (d.photoBase64) {
                    showPhoto(d.photoBase64);
                } else {
                    showInitial(d.name || user.email);
                }
            } else {
                showInitial(user.email);
            }
        } catch(e) {
            showInitial(user.email);
        }
    }

    // ── Avatar helpers ────────────────────────────────────────
    function showInitial(nameOrEmail) {
        const letter = (nameOrEmail || '?')[0].toUpperCase();
        document.getElementById('avatarInitial').textContent = letter;
        document.getElementById('avatarInitial').style.display = 'block';
        document.getElementById('avatarImg').style.display = 'none';
    }

    function showPhoto(base64) {
        document.getElementById('avatarImg').src = base64;
        document.getElementById('avatarImg').style.display = 'block';
        document.getElementById('avatarInitial').style.display = 'none';
    }

    // ── Handle picture selection ──────────────────────────────
    function handlePicSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Max 1MB check
        if (file.size > 1 * 1024 * 1024) {
            showMsg('error', '❌ Image too large. Please choose a photo under 1MB.');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            newPicBase64 = e.target.result;
            showPhoto(newPicBase64);
        };
        reader.readAsDataURL(file);
    }

    // ── Save profile to Firestore ─────────────────────────────
    async function saveProfile() {
        const name   = document.getElementById('inputName').value.trim();
        const rollNo = document.getElementById('inputRoll').value.trim();
        const btn    = document.getElementById('saveBtn');

        if (!name) {
            showMsg('error', '❌ Name cannot be empty.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
            // Build update object
            const updateData = {
                name,
                rollNo,
                email: currentUser.email,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            // Include photo only if a new one was selected
            if (newPicBase64) {
                updateData.photoBase64 = newPicBase64;
            }

            // Save to students collection using uid as doc id
            await db.collection('students').doc(currentUser.uid).set(
                updateData,
                { merge: true }   // merge so other fields aren't wiped
            );

            showMsg('success', '✅ Profile updated! Redirecting...');

            // Go back to dashboard after short delay so it reloads with new name
            setTimeout(() => {
                window.location.href = 'traildashboard.html';
            }, 1200);

        } catch(e) {
            showMsg('error', '❌ Error saving: ' + e.message);
            btn.disabled = false;
            btn.textContent = 'Save Changes';
        }
    }

    function showMsg(type, text) {
        const el = document.getElementById('msg');
        el.className = 'msg ' + type;
        el.textContent = text;
    }

    // ── Auth ──────────────────────────────────────────────────
    firebase.auth().onAuthStateChanged(user => {
        if (user) loadProfile(user);
        else window.location.href = 'login.html';
    });
</script>
</body>
</html>
