<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .results-header {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-bottom: 30px;
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            position: relative;
        }
        
        .score-circle.pass {
            border-color: #22c55e;
        }
        
        .score-circle.fail {
            border-color: #ef4444;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: 700;
            color: #1e3a5f;
        }
        
        .result-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .result-title.pass {
            color: #22c55e;
        }
        
        .result-title.fail {
            color: #ef4444;
        }
        
        .result-subtitle {
            color: #64748b;
            font-size: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1e3a5f;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #f8fafc;
        }
        
        .review-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .review-header h2 {
            font-size: 24px;
            color: #1e3a5f;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active {
            border-color: #667eea;
            background: #eff6ff;
            color: #667eea;
        }
        
        .question-review {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .question-review.correct {
            border-color: #22c55e;
            background: #f0fdf4;
        }
        
        .question-review.incorrect {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .question-review.unanswered {
            border-color: #f59e0b;
            background: #fffbeb;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .question-number {
            font-weight: 600;
            color: #64748b;
        }
        
        .result-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .result-badge.correct {
            background: #22c55e;
            color: white;
        }
        
        .result-badge.incorrect {
            background: #ef4444;
            color: white;
        }
        
        .result-badge.unanswered {
            background: #f59e0b;
            color: white;
        }
        
        .question-text {
            font-size: 18px;
            color: #1e3a5f;
            margin-bottom: 15px;
        }
        
        .answer-option {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .answer-option.user-answer {
            background: #dbeafe;
            border: 2px solid #3b82f6;
        }
        
        .answer-option.correct-answer {
            background: #dcfce7;
            border: 2px solid #22c55e;
        }
        
        .answer-option.wrong-answer {
            background: #fee2e2;
            border: 2px solid #ef4444;
        }
        
        @media (max-width: 768px) {
            .actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            .filter-buttons {
                flex-direction: column;
            }
            .review-header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="results-header" id="resultsHeader">
            <div class="score-circle" id="scoreCircle">
                <div class="score-value" id="scoreValue">--</div>
            </div>
            <h1 class="result-title" id="resultTitle">Loading...</h1>
            <p class="result-subtitle" id="resultSubtitle">Please wait...</p>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Total Questions</div>
                    <div class="stat-value" id="totalQuestions">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Answered</div>
                    <div class="stat-value" id="answeredCount">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Correct</div>
                    <div class="stat-value" id="correctCount" style="color: #22c55e;">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Wrong</div>
                    <div class="stat-value" id="wrongCount" style="color: #ef4444;">--</div>
                </div>
            </div>

            <div class="actions">
                <a href="traildashboard.html" class="btn btn-primary">Back to Dashboard</a>
                <a href="tcs-test-selection.html" class="btn btn-secondary">Take Another Test</a>
            </div>
        </div>

        <div class="review-section">
            <div class="review-header">
                <h2>Review Answers</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterQuestions('all')">All</button>
                    <button class="filter-btn" onclick="filterQuestions('correct')">Correct</button>
                    <button class="filter-btn" onclick="filterQuestions('incorrect')">Incorrect</button>
                    <button class="filter-btn" onclick="filterQuestions('unanswered')">Unanswered</button>
                </div>
            </div>
            <div id="questionsReview"></div>
        </div>
    </div>

    <script>
        let results = null;
        let currentFilter = 'all';

        function loadResults() {
            const data = sessionStorage.getItem('examResults');
            if (!data) {
                alert('No exam results found. Please take a test first.');
                window.location.href = 'traildashboard.html';
                return;
            }

            results = JSON.parse(data);
            displayResults();
            displayReview();
        }

        function displayResults() {
            const scoreCircle = document.getElementById('scoreCircle');
            const scoreValue = document.getElementById('scoreValue');
            const resultTitle = document.getElementById('resultTitle');
            const resultSubtitle = document.getElementById('resultSubtitle');

            const passed = results.score >= 60;

            scoreCircle.className = 'score-circle ' + (passed ? 'pass' : 'fail');
            scoreValue.textContent = results.score + '%';
            resultTitle.className = 'result-title ' + (passed ? 'pass' : 'fail');
            resultTitle.textContent = passed ? 'Congratulations! You Passed!' : 'Keep Practicing!';
            resultSubtitle.textContent = `You scored ${results.correct} out of ${results.totalQuestions} questions correctly`;

            document.getElementById('totalQuestions').textContent = results.totalQuestions;
            document.getElementById('answeredCount').textContent = results.answered;
            document.getElementById('correctCount').textContent = results.correct;
            document.getElementById('wrongCount').textContent = results.wrong || (results.answered - results.correct);
        }

        function displayReview() {
            const container = document.getElementById('questionsReview');
            let html = '';

            results.questions.forEach((q, index) => {
                        if (currentFilter === 'correct' && !q.isCorrect) return;
                        if (currentFilter === 'incorrect' && (q.isCorrect || q.userAnswer === undefined)) return;
                        if (currentFilter === 'unanswered' && q.userAnswer !== undefined) return;

                        const status = q.userAnswer === undefined ? 'unanswered' : (q.isCorrect ? 'correct' : 'incorrect');
                        const badge = q.userAnswer === undefined ? 'Unanswered' : (q.isCorrect ? 'Correct' : 'Incorrect');

                        html += `
                    <div class="question-review ${status}">
                        <div class="question-header">
                            <span class="question-number">Question ${index + 1}</span>
                            <span class="result-badge ${status}">${badge}</span>
                        </div>
                        <div class="question-text">${q.question}</div>
                        ${q.options.map((option, optIndex) => {
                            let className = 'answer-option';
                            if (optIndex === q.correctAnswer) className += ' correct-answer';
                            if (optIndex === q.userAnswer && optIndex !== q.correctAnswer) className += ' wrong-answer';
                            if (optIndex === q.userAnswer) className += ' user-answer';
                            
                            let label = '';
                            if (optIndex === q.correctAnswer) label = '✓ Correct Answer';
                            if (optIndex === q.userAnswer && optIndex !== q.correctAnswer) label = '✗ Your Answer';
                            if (optIndex === q.userAnswer && optIndex === q.correctAnswer) label = '✓ Your Answer (Correct)';
                            
                            return `
                                <div class="${className}">
                                    <strong>${String.fromCharCode(65 + optIndex)}.</strong> ${option}
                                    ${label ? `<span style="margin-left: auto; font-weight: 600;">${label}</span>` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            });

            if (html === '') {
                html = '<p style="text-align: center; color: #64748b; padding: 40px;">No questions to show</p>';
            }

            container.innerHTML = html;
        }

        function filterQuestions(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayReview();
        }

        loadResults();
    </script>
</body>

</html>
